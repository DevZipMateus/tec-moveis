<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demonstração de Vitrine — Tec Móveis</title>
  <meta name="description" content="Confira nossa vitrine online de móveis planejados e convencionais. Tec Móveis — qualidade de alto padrão com o melhor preço.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --orange:      #C85A0F;
      --orange-mid:  #D96A1A;
      --orange-lt:   #E87A28;
      --dark:        #1C1B19;
      --dark-soft:   #2E2D2A;
      --white:       #FFFFFF;
      --header-h:    80px;
      --badge-h:     63px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--dark);
    }

    /* ===== HEADER ===== */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: var(--header-h);
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(28,27,25,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .header-logo span { color: var(--orange-lt); }

    nav { display: flex; align-items: center; gap: 32px; }
    nav a {
      color: rgba(255,255,255,0.68);
      font-size: 14px;
      font-weight: 400;
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom: 2px solid var(--orange-lt); padding-bottom: 2px; }
    .nav-cta {
      background: var(--orange) !important;
      color: #fff !important;
      padding: 9px 22px;
      border-radius: 6px;
      font-weight: 600 !important;
      font-size: 13px !important;
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: var(--orange-lt) !important; }
    .nav-vitrine {
      background: rgba(232,122,40,0.12) !important;
      color: var(--orange-lt) !important;
      padding: 9px 20px;
      border-radius: 6px;
      font-weight: 600 !important;
      font-size: 13px !important;
      border: 1px solid rgba(232,122,40,0.3);
      transition: all 0.2s !important;
    }
    .nav-vitrine:hover { background: rgba(232,122,40,0.22) !important; border-color: rgba(232,122,40,0.5); }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: all 0.3s;
    }

    #navMenu {
      display: none;
      position: fixed;
      top: var(--header-h); left: 0; right: 0;
      background: rgba(28,27,25,0.98);
      backdrop-filter: blur(20px);
      padding: 12px 24px 24px;
      flex-direction: column;
      z-index: 999;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    #navMenu.open { display: flex; }
    #navMenu a {
      color: rgba(255,255,255,0.78);
      font-size: 16px;
      font-weight: 400;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-decoration: none;
      transition: color 0.2s;
    }
    #navMenu a:last-child { border-bottom: none; }
    #navMenu a:hover { color: #fff; }
    #navMenu .mob-cta {
      margin-top: 8px;
      background: var(--orange);
      color: #fff !important;
      text-align: center;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      border-bottom: none !important;
    }
    #navMenu .mob-cta:hover { background: var(--orange-lt); }

    /* ===== IFRAME ===== */
    .vitrine-frame {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: 100%;
      height: calc(100vh - var(--header-h) - var(--badge-h));
      border: none;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      :root { --header-h: 60px; }
      header { padding: 0 20px; }
      nav { display: none; }
      .hamburger { display: flex; }
    }

    @media (max-width: 480px) {
      header { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <a href="index.html" class="header-logo">Tec <span>Móveis</span></a>
  <nav>
    <a href="index.html#sobre">Sobre</a>
    <a href="index.html#produtos">Produtos</a>
    <a href="index.html#promocao">Promoção</a>
    <a href="vitrine.html" class="nav-vitrine active"><i class="fas fa-store"></i> Vitrine</a>
    <a href="index.html#contato" class="nav-cta">Fale conosco</a>
  </nav>
  <button class="hamburger" id="menuBtn" aria-label="Abrir menu">
    <span></span><span></span><span></span>
  </button>
</header>

<nav id="navMenu">
  <a href="index.html#sobre" onclick="closeMenu()">Sobre</a>
  <a href="index.html#produtos" onclick="closeMenu()">Produtos</a>
  <a href="index.html#promocao" onclick="closeMenu()">Promoção</a>
  <a href="vitrine.html" onclick="closeMenu()"><i class="fas fa-store"></i> Vitrine</a>
  <a href="index.html#contato" onclick="closeMenu()">Contato</a>
  <a href="https://wa.me/551195039177" target="_blank" onclick="closeMenu()" class="mob-cta">
    <i class="fab fa-whatsapp"></i> Falar no WhatsApp
  </a>
</nav>

<!-- ===== IFRAME ===== -->
<iframe class="vitrine-frame" src="https://lojatecplanejados.egestor.com.br/vitrine/" title="Vitrine Tec Móveis"></iframe>

<script>
  const menuBtn = document.getElementById('menuBtn');
  const navMenu = document.getElementById('navMenu');
  menuBtn.addEventListener('click', () => navMenu.classList.toggle('open'));
  function closeMenu() { navMenu.classList.remove('open'); }
</script>
</body>
</html>
